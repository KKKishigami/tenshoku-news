<!DOCTYPE html>
<html lang="ja">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="ブラウザで遊べる無料の避けゲーム「DODGE MASTER」。5ステージ制でスマホ・PC両対応。">

  <!-- 上部広告 (728x90 PC / 320x50 スマホ) -->

      <!-- AdSense審査通過後に下記を有効化

    <!-- 右サイド広告 (PCのみ表示) -->

      <!-- AdSense審査通過後に下記を有効化

  </div>

  <!-- 下部広告 -->
  <div class="ad-wrap ad-bottom">
    <!-- AdSense審査通過後に下記を有効化
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
