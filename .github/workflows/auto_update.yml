name: 記事自動生成・デプロイ

on:
  schedule:
    # 毎日 09:00 JST（= 00:00 UTC）に実行
    - cron: '0 0 * * *'
  # 手動実行も可能
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install anthropic

      - name: 記事を生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_articles.py

      - name: 変更をコミット & プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/ sitemap.xml
          git diff --cached --quiet || git commit -m "chore: 記事自動更新 $(date +'%Y-%m-%d')"
          git push
